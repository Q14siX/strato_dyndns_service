update_domains:
  name: Update domains
  description: Update one or more configured STRATO DynDNS domains and return the structured server response.
  fields:
    device_id:
      name: Domain devices
      description: Select one or more configured domain devices provided by this integration.
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: strato_dyndns_service
              manufacturer: STRATO
              model: Configured Domain
    ip_version:
      name: IP version
      description: Which address family should be updated.
      default: auto
      selector:
        select:
          translation_key: ip_version
          options:
            - auto
            - ipv4
            - ipv6
